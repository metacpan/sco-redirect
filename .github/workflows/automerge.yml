name: Enable Auto-Merge For bots
on:
  pull_request_target:
    types: [opened]

permissions: {}

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'metacpan-automation[bot]'
      || github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Generate Auth Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permissions-pull-requests: write
      - name: Enable Pull Request Auto Merge
        uses: actions/github-script@v9
        id: dispatch
        env:
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const pr = process.env.PULL_REQUEST;

            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
            });

            const mutation = `
              mutation EnableAutoMerge {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: "${pullRequest.node_id}",
                  mergeMethod: SQUASH
                }) {
                  clientMutationId
                }
              }
            `;

            try {
              await github.graphql(mutation);
              console.log("Auto-merge with squash successfully enabled");
            } catch (error) {
              console.error("Failed to enable auto-merge with squash:", error);
            }
